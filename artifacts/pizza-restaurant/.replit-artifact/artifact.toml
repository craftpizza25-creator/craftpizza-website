kind = "web"
previewPath = "/"
title = "Pizza Restaurant"
version = "1.0.0"
id = "artifacts/pizza-restaurant"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22017

[services.development]
run = "pnpm --filter @workspace/pizza-restaurant run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pizza-restaurant", "run", "build" ]
serve = "static"
publicDir = "artifacts/pizza-restaurant/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22017"
BASE_PATH = "/"
